languages:
  - id: c
    name: C
    source_filename: solution.c
    artifact: solution
    smoke_cmd: [/usr/bin/gcc, --version]
    build:
      cmd: /usr/bin/gcc
      args: ["{{flags}}", "-o", "{{artifact}}", "{{source}}"]
      limits: { wall_time_s: 5, memory_kb: 1048576, max_processes: 100 }
      flag_allowlist: ["-O0", "-O1", "-O2", "-O3", "-Wall", "-Wextra", "-std=*"]
    run:
      cmd: "{{artifact}}"
      limits: { wall_time_s: 3, memory_kb: 524288, max_processes: 64 }

  - id: cpp
    name: C++
    source_filename: solution.cpp
    artifact: solution
    smoke_cmd: [/usr/bin/g++, --version]
    build:
      cmd: /usr/bin/g++
      args: ["{{flags}}", "-o", "{{artifact}}", "{{source}}"]
      limits: { wall_time_s: 5, memory_kb: 1048576, max_processes: 100 }
      flag_allowlist: ["-O0", "-O1", "-O2", "-O3", "-Wall", "-Wextra", "-std=*"]
    run:
      cmd: "{{artifact}}"
      limits: { wall_time_s: 3, memory_kb: 524288, max_processes: 64 }

  - id: py3
    name: Python 3
    source_filename: solution.py
    smoke_cmd: [/usr/bin/python3, --version]
    run:
      cmd: /usr/bin/python3
      args: ["{{source}}"]
      limits: { wall_time_s: 9, memory_kb: 102400, max_processes: 100 }

  - id: java
    name: Java
    source_filename: Solution.java
    artifact: Solution
    smoke_cmd: [/usr/bin/java, --version]
    build:
      cmd: /usr/bin/javac
      args: ["{{source}}"]
      limits: { wall_time_s: 10, memory_kb: 524288, max_processes: 100 }
    run:
      cmd: /usr/bin/java
      args: ["{{artifact}}"]
      limits: { wall_time_s: 5, memory_kb: 524288, max_processes: 64 }

  - id: js
    name: JavaScript
    source_filename: solution.js
    smoke_cmd: [/usr/bin/node, --version]
    run:
      cmd: /usr/bin/node
      args: ["{{source}}"]
      limits: { wall_time_s: 9, memory_kb: 102400, max_processes: 100 }

  - id: go
    name: Go
    source_filename: solution.go
    artifact: solution
    smoke_cmd: [/usr/local/go/bin/go, version]
    build:
      cmd: /usr/local/go/bin/go
      args: ["build", "-o", "{{artifact}}", "{{source}}"]
      limits: { wall_time_s: 10, memory_kb: 1048576, max_processes: 100 }
    run:
      cmd: "{{artifact}}"
      limits: { wall_time_s: 5, memory_kb: 524288, max_processes: 64 }
  