services:
  goboxd:
    build:
      context: .
      target: runtime
    image: goboxd:dev
    container_name: goboxd
    ports:
      - "8080:8080"
    privileged: true

  dev:
    build:
      context: .
      target: builder
    image: goboxd-tools:dev
    volumes:
      - .:/src
    working_dir: /src
    ports:
      - "8080:8080"
    privileged: true
    environment:
      GOBOXD_CONFIG: /src/configs/config.yaml
      GOBOXD_LANGUAGES_FILE: /src/configs/languages.yaml
      GOBOXD_JAIL_DIR: /tmp/goboxd-jails
    command: air

  tools:
    build:
      context: .
      target: builder
    image: goboxd-tools:dev
    volumes:
      - .:/src
    working_dir: /src
    profiles: ["tools"]
    entrypoint: []
